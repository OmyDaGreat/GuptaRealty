services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx512m
      - PORT=8080
      - ASSETS_PATH=/app/assets
      - BEARER_TOKEN=${BEARER_TOKEN}
      - FUB_API_KEY=${FUB_API_KEY}
    volumes:
      - assets_data:/app/assets
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 768M
    restart: unless-stopped

volumes:
    assets_data:
